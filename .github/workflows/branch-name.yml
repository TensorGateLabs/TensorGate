name: Branch Name Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch naming convention
        uses: lekterable/branchlint-action@2.0.0
        with:
          allowed: |
            feature\/[0-9]+-[a-z0-9-]+
            fix\/[0-9]+-[a-z0-9-]+
            refactor\/[a-z0-9-]+
            docs\/[a-z0-9-]+
            bench\/[a-z0-9-]+
