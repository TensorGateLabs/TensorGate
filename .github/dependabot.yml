version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "type:infrastructure"
      - "component:ci-cd"
    commit-message:
      prefix: "chore(deps)"
    groups:
      dotnet-minors:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "type:infrastructure"
      - "component:ci-cd"
    commit-message:
      prefix: "chore(actions)"
