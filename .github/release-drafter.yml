name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
template: |
  ## What Changed

  $CHANGES

  ## Notes

  - Built for .NET 10 LTS
  - See linked issues and ADRs for technical rationale

categories:
  - title: "Features"
    labels:
      - "type:feature"
  - title: "Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Performance & Benchmarks"
    labels:
      - "type:benchmark"
  - title: "Infrastructure"
    labels:
      - "type:infrastructure"
      - "component:ci-cd"
  - title: "Documentation"
    labels:
      - "documentation"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "type:feature"
  patch:
    labels:
      - "bug"
      - "fix"
  default: patch

exclude-labels:
  - "skip-changelog"
